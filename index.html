<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="description" content="Trabajando con javascript" />
        <meta name="keywords" content="javascript,ufg,jaime,jeovanny,cortez,flores" />
        <meta name="author" content="Jaime Jeovanny Cortez Flores" />
        <meta name="copyright" content="2026 JJCF" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <link rel="shortcut icon" href="./media/logo/jslogo.png" type="x-icon" />
        <title>Práctica sobre Javascript Jaime Jeovanny Cortez Flores</title>
        <link rel="stylesheet" href="./css/style.css" />
    </head>
    <body>
        <div id="banner"></div>

        <div id="mensajito">
            Hola, este es un mensaje de la página
            <p data-identificador="submensaje1">Hola, este es el primer párrafo dentro del div</p>
            <p data-identificador="submensaje2">Hola, este es el segundo párrafo dentro del div</p>
            <p data-identificador="submensaje3">Hola, este es el tercer párrafo dentro del div</p>
        </div>

        <div id="sumatoria">
            <input type="number" name="primer_sumando" id="primer_sumando" value="1.55" max="10" min="0" step="0.01" />
            <input type="number" name="segundo_sumando" id="segundo_sumando" value="1.55" max="10" min="0" step="0.01" />
            <div id="resultado">
                <button onclick="calcular('primer_sumando','segundo_sumando','salida');">Calcular</button>
                <br />
                <output id="salida"></output>
            </div>
        </div>

        <button id="btn_crear_elemento" onclick="crearElemento();">Crear Imágenes</button>
        <div id="lienzo">
            
        </div>

        <script src="js/scripts.js"></script>
    </body>
</html>
